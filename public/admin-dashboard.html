<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Media — Owner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842;
            --orange: #f5820a;
            --dark: #08080f;
            --dark2: #0d0d1a;
            --dark3: #12102a;
            --card: rgba(255,255,255,0.04);
            --border: rgba(245,200,66,0.18);
            --border-orange: rgba(245,130,10,0.3);
            --text: #f0e8d0;
            --text-dim: rgba(240,232,208,0.55);
            --green: #22d87a;
            --red: #ff5c5c;
            --blue: #4a9eff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        /* ── LOADING SCREEN ── */
        #auth-check {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 20px;
        }
        .auth-seal {
            width: 90px;
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(245,130,10,0.6));
            animation: sealPulse 2s ease-in-out infinite;
        }
        @keyframes sealPulse {
            0%,100% { filter: drop-shadow(0 0 10px rgba(245,130,10,0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(245,130,10,0.9)); }
        }
        .auth-text {
            font-family: 'Cinzel', serif;
            color: rgba(245,130,10,0.6);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* ── TOPBAR ── */
        .owner-topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(8,8,15,0.97);
            border-bottom: 1px solid var(--border-orange);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: 62px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-seal {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(245,130,10,0.5));
        }

        .topbar-brand {
            display: flex;
            flex-direction: column;
        }
        .topbar-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.95rem;
            color: var(--orange);
            letter-spacing: 0.08em;
            line-height: 1;
        }
        .topbar-sub {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-stats {
            display: flex;
            gap: 20px;
        }
        .stat-pill {
            background: rgba(245,200,66,0.07);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.78rem;
            color: var(--gold);
            font-family: 'Cinzel', serif;
        }
        .stat-pill span {
            color: var(--text-dim);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.72rem;
            margin-right: 4px;
        }

        .btn-logout {
            background: rgba(255,92,92,0.12);
            border: 1px solid rgba(255,92,92,0.3);
            color: var(--red);
            padding: 7px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255,92,92,0.25);
        }

        .btn-portal {
            background: rgba(245,200,66,0.08);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 7px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-portal:hover {
            background: rgba(245,200,66,0.18);
        }

        /* ── MAIN LAYOUT ── */
        .owner-main {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
            padding-top: 62px;
        }

        /* ── SIDEBAR ── */
        .owner-sidebar {
            background: rgba(13,13,26,0.98);
            border-right: 1px solid var(--border-orange);
            padding: 24px 0;
            overflow-y: auto;
            height: calc(100vh - 62px);
            position: sticky;
            top: 62px;
        }

        .sidebar-section-label {
            font-size: 0.62rem;
            color: rgba(245,130,10,0.45);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            padding: 0 20px 8px;
            margin-top: 12px;
        }

        .sidebar-search {
            padding: 0 16px 16px;
        }
        .sidebar-search input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .sidebar-search input:focus {
            border-color: rgba(245,130,10,0.5);
        }
        .sidebar-search input::placeholder { color: var(--text-dim); }

        .request-card {
            padding: 14px 20px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .request-card:hover {
            background: rgba(245,130,10,0.06);
            border-left-color: rgba(245,130,10,0.4);
        }
        .request-card.active {
            background: rgba(245,130,10,0.1);
            border-left-color: var(--orange);
        }

        .rc-name {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
        }
        .rc-type {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rc-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .rc-date {
            font-size: 0.65rem;
            color: var(--text-dim);
        }
        .rc-progress {
            font-size: 0.65rem;
            color: var(--orange);
            font-weight: 700;
        }

        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot-signed   { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .dot-pending  { background: var(--gold);  box-shadow: 0 0 5px var(--gold); }
        .dot-complete { background: var(--blue);  box-shadow: 0 0 5px var(--blue); }
        .dot-cancelled{ background: var(--red);   box-shadow: 0 0 5px var(--red); }

        .no-requests {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* ── DETAIL PANEL ── */
        .owner-detail {
            padding: 28px 32px;
            overflow-y: auto;
        }

        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 16px;
            color: var(--text-dim);
        }
        .detail-empty-seal {
            width: 80px;
            opacity: 0.3;
            filter: grayscale(1);
        }
        .detail-empty-text {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        /* Detail header */
        .detail-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .detail-title-group {}
        .detail-id {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .detail-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .detail-subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .detail-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Status selector */
        .status-select-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-select-wrap label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        select.status-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-orange);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.88rem;
            padding: 7px 14px;
            outline: none;
            cursor: pointer;
        }
        select.status-select option { background: #12102a; }

        /* ── DETAIL GRID ── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 1100px) {
            .detail-grid { grid-template-columns: 1fr; }
            .owner-main { grid-template-columns: 260px 1fr; }
        }
        @media (max-width: 768px) {
            .owner-main { grid-template-columns: 1fr; }
            .owner-sidebar { height: auto; position: static; }
        }

        .detail-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .detail-card-title {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-orange);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 12px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .info-value {
            font-size: 0.88rem;
            color: var(--text);
            font-weight: 600;
            text-align: right;
            word-break: break-word;
        }

        /* ── CONFIG TABLE ── */
        .config-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .config-table th {
            padding: 8px 12px;
            text-align: left;
            background: rgba(245,130,10,0.08);
            color: var(--orange);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--border-orange);
        }
        .config-table td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: var(--text);
            vertical-align: top;
        }
        .config-table tr:last-child td { border-bottom: none; }
        .config-table tr:hover td { background: rgba(245,130,10,0.04); }
        .price-cell {
            color: var(--gold) !important;
            font-weight: 700;
        }

        /* ── REQUIREMENTS CHECKLIST ── */
        .requirements-card {
            background: var(--card);
            border: 1px solid var(--border-orange);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .req-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .req-title {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .req-progress-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .req-progress-bar {
            width: 120px;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .req-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--gold));
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .req-progress-text {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 700;
            min-width: 35px;
            text-align: right;
        }

        .req-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .req-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .req-item:hover { background: rgba(255,255,255,0.06); }
        .req-item.completed {
            background: rgba(34,216,122,0.05);
            border-color: rgba(34,216,122,0.2);
        }

        .req-checkbox {
            width: 20px; height: 20px;
            border: 2px solid rgba(245,130,10,0.4);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            background: transparent;
        }
        .req-item.completed .req-checkbox {
            background: var(--green);
            border-color: var(--green);
        }
        .req-checkbox-tick {
            color: #fff;
            font-size: 0.7rem;
            display: none;
        }
        .req-item.completed .req-checkbox-tick { display: block; }

        .req-text-wrap {
            flex: 1;
        }
        .req-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            transition: color 0.2s;
        }
        .req-item.completed .req-label {
            color: var(--green);
            text-decoration: line-through;
            text-decoration-color: rgba(34,216,122,0.4);
        }
        .req-desc {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .req-date {
            font-size: 0.65rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .req-item.completed .req-date {
            color: var(--green);
        }

        /* Add custom requirement */
        .req-add-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .req-add-input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .req-add-input:focus { border-color: rgba(245,130,10,0.5); }
        .req-add-input::placeholder { color: var(--text-dim); }

        .btn-add-req {
            background: rgba(245,130,10,0.15);
            border: 1px solid var(--border-orange);
            color: var(--orange);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-add-req:hover { background: rgba(245,130,10,0.28); }

        /* ── NOTES SECTION ── */
        .notes-area {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        .notes-area:focus { border-color: rgba(245,130,10,0.5); }
        .notes-area::placeholder { color: var(--text-dim); }

        .btn-save-notes {
            background: linear-gradient(135deg, #c45c00, var(--orange));
            border: none;
            color: #fff;
            padding: 9px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(200,80,0,0.35);
        }
        .btn-save-notes:hover {
            box-shadow: 0 6px 18px rgba(200,80,0,0.55);
            transform: translateY(-1px);
        }

        .save-feedback {
            font-size: 0.75rem;
            color: var(--green);
            margin-left: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-feedback.show { opacity: 1; }

        /* ── WAXSEAL DISPLAY ── */
        .client-seal-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
        }
        .client-seal-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(245,130,10,0.4));
        }
        .client-seal-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ── STATUS BADGE ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .badge-signed    { background: rgba(34,216,122,0.12); color: var(--green); border: 1px solid rgba(34,216,122,0.3); }
        .badge-pending   { background: rgba(245,200,66,0.12); color: var(--gold);  border: 1px solid rgba(245,200,66,0.3); }
        .badge-complete  { background: rgba(74,158,255,0.12); color: var(--blue);  border: 1px solid rgba(74,158,255,0.3); }
        .badge-cancelled { background: rgba(255,92,92,0.12);  color: var(--red);   border: 1px solid rgba(255,92,92,0.3); }
        .badge-in-progress { background: rgba(245,130,10,0.12); color: var(--orange); border: 1px solid rgba(245,130,10,0.3); }

        /* ── DIVIDER ── */
        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: rgba(13,13,26,0.97);
            border: 1px solid rgba(34,216,122,0.4);
            color: var(--green);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 9999;
            transform: translateY(60px);
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.error {
            border-color: rgba(255,92,92,0.4);
            color: var(--red);
        }

        /* —— Invoice Admin Section —— */
        .invoice-admin-section {
            padding: 4px 0;
        }
        .btn-download-invoice {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(245,200,66,0.12), rgba(139,0,0,0.08));
            border: 1px solid rgba(245,200,66,0.3);
            border-radius: 8px;
            color: var(--gold);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 9px 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-download-invoice:hover {
            background: linear-gradient(135deg, rgba(245,200,66,0.2), rgba(139,0,0,0.12));
            border-color: rgba(245,200,66,0.5);
            box-shadow: 0 0 12px rgba(245,200,66,0.15);
        }
        .btn-view-invoice {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            padding: 9px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-view-invoice:hover {
            border-color: rgba(245,200,66,0.35);
            color: var(--text);
        }
        .btn-generate-invoice {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #c45c00, #f5820a);
            border: 1px solid rgba(245,130,10,0.5);
            border-radius: 8px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(200,80,0,0.3);
        }
        .btn-generate-invoice:hover {
            background: linear-gradient(135deg, #d96800, #ff9520);
            box-shadow: 0 6px 18px rgba(200,80,0,0.5);
            transform: translateY(-1px);
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<!-- Auth check overlay -->
<div id="auth-check">
    <img src="wax_seals/custom_wax_seal_1773187339589.png" alt="Seal" class="auth-seal">

</div>

<!-- Topbar -->
<div class="owner-topbar" id="owner-ui" style="display:none;">
    <div class="topbar-left">
        <img src="wax_seals/custom_wax_seal_1773187339589.png" alt="Owner Seal" class="topbar-seal">
        <div class="topbar-brand">
            <div class="topbar-title">Owner Portal</div>
            <div class="topbar-sub">Method Media — Restricted Access</div>
        </div>
    </div>
    <div class="topbar-right">
        <div class="topbar-stats">
            <div class="stat-pill"><span>Requests</span><span id="stat-total">—</span></div>
            <div class="stat-pill"><span>Active</span><span id="stat-active">—</span></div>
            <div class="stat-pill"><span>Complete</span><span id="stat-complete">—</span></div>
        </div>
        <a href="/" class="btn-portal">← Portal</a>
        <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
</div>

<!-- Main layout -->
<div class="owner-main" id="owner-main" style="display:none;">

    <!-- Sidebar: request list -->
    <div class="owner-sidebar">
        <div class="sidebar-section-label">Build Requests</div>
        <div class="sidebar-search">
            <input type="text" id="search-input" placeholder="🔍 Search clients…">
        </div>
        <div id="request-list">
            <div class="no-requests">Loading requests…</div>
        </div>
    </div>

    <!-- Detail panel -->
    <div class="owner-detail" id="detail-panel">
        <div class="detail-empty">
            <img src="wax_seals/custom_wax_seal_1773187339589.png" alt="" class="detail-empty-seal">
            <div class="detail-empty-text">Select a Request</div>
            <div style="font-size:0.8rem;color:var(--text-dim);margin-top:4px;">Choose a build request from the left panel</div>
        </div>
    </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   METHOD MEDIA — OWNER PORTAL
   Loads only after successful admin session verification
   ══════════════════════════════════════════════════════ */

let allAgreements = [];
let activeId = null;

/* ── Default requirements per project type ── */
const DEFAULT_REQUIREMENTS = {
    'enterprise': [
        { id: 'r1', label: 'Discovery & Requirements Gathering', desc: 'Initial meeting, scope documentation', done: false },
        { id: 'r2', label: 'Project Charter Signed', desc: 'Co-signed within 5 business days', done: false },
        { id: 'r3', label: 'Architecture Design', desc: 'System architecture document delivered', done: false },
        { id: 'r4', label: 'Development Sprint 1', desc: 'Core module development begins', done: false },
        { id: 'r5', label: 'Development Sprint 2', desc: 'Secondary features and integrations', done: false },
        { id: 'r6', label: 'QA & Testing', desc: 'Full testing cycle completed', done: false },
        { id: 'r7', label: 'Client Acceptance Testing', desc: 'Client sign-off on deliverables', done: false },
        { id: 'r8', label: 'Deployment', desc: 'Production deployment completed', done: false },
        { id: 'r9', label: 'Training & Handover', desc: 'Staff training and documentation delivered', done: false },
        { id: 'r10', label: 'Final Invoice Sent', desc: 'Invoice issued and payment received', done: false }
    ],
    default: [
        { id: 'r1', label: 'Initial Consultation Booked', desc: 'Schedule discovery call with client', done: false },
        { id: 'r2', label: 'Project Charter Signed', desc: 'Co-signed within 5 business days of agreement', done: false },
        { id: 'r3', label: 'Deposit Received', desc: 'Initial deposit payment confirmed', done: false },
        { id: 'r4', label: 'Design Mockups Approved', desc: 'Client sign-off on design direction', done: false },
        { id: 'r5', label: 'Development Phase Complete', desc: 'All deliverables built and tested', done: false },
        { id: 'r6', label: 'Client Review & Revisions', desc: 'Up to 3 revision rounds completed', done: false },
        { id: 'r7', label: 'Final Delivery', desc: 'All assets delivered to client', done: false },
        { id: 'r8', label: 'Final Invoice Paid', desc: 'Payment confirmed and recorded', done: false }
    ]
};

/* ── Auth check on load ── */
async function checkAuth() {
    try {
        const res = await fetch('/api/admin/check-auth');
        if (res.ok) {
            const data = await res.json();
            if (data.authenticated) {
                showDashboard();
                return;
            }
        }
    } catch(e) {}
    // Not authenticated — redirect to portal
    window.location.href = '/';
}

function showDashboard() {
    document.getElementById('auth-check').style.display = 'none';
    document.getElementById('owner-ui').style.display = 'flex';
    document.getElementById('owner-main').style.display = 'grid';
    loadAgreements();
}

/* ── Load all agreements ── */
async function loadAgreements() {
    try {
        const res = await fetch('/api/admin/agreements');
        const data = await res.json();
        if (data.success) {
            allAgreements = data.agreements;
            updateStats();
            renderSidebar(allAgreements);
        }
    } catch(e) {
        showToast('Failed to load requests', true);
    }
}

function updateStats() {
    document.getElementById('stat-total').textContent = allAgreements.length;
    document.getElementById('stat-active').textContent =
        allAgreements.filter(a => a.status === 'signed' || a.status === 'in-progress').length;
    document.getElementById('stat-complete').textContent =
        allAgreements.filter(a => a.status === 'complete').length;
}

/* ── Sidebar rendering ── */
function renderSidebar(agreements) {
    const list = document.getElementById('request-list');
    if (!agreements.length) {
        list.innerHTML = '<div class="no-requests">No build requests yet</div>';
        return;
    }

    list.innerHTML = agreements.map(a => {
        const reqs = parseJSON(a.requirements, null);
        const progress = reqs ? calcProgress(reqs) : null;
        const statusDot = getStatusDot(a.status);
        const prefs = parseJSON(a.preferences, {});
        const projectType = prefs['project-type']?.title || a.agreement_type?.split(' ')[0] || 'Project';
        const date = new Date(a.created_at).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' });

        return `
            <div class="request-card ${activeId === a.id ? 'active' : ''}"
                 onclick="selectRequest(${a.id})" id="rc-${a.id}">
                <div class="rc-name">
                    <span class="status-dot ${statusDot}"></span>
                    ${esc(a.user_name || 'Unknown Client')}
                </div>
                <div class="rc-type">${esc(projectType)}</div>
                <div class="rc-meta">
                    <span class="rc-date">${date}</span>
                    ${a.invoice_number ? `<span class="rc-invoice" title="Invoice generated">📄</span>` : ''}
                    ${progress !== null ? `<span class="rc-progress">${progress}% done</span>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

/* ── Select a request ── */
async function selectRequest(id) {
    activeId = id;
    // Update sidebar active state
    document.querySelectorAll('.request-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById(`rc-${id}`);
    if (card) card.classList.add('active');

    const detail = document.getElementById('detail-panel');
    detail.innerHTML = '<div class="detail-empty"><div class="auth-text">Loading…</div></div>';

    try {
        const res  = await fetch(`/api/admin/agreement-detail/${id}`);
        const data = await res.json();
        if (data.success) {
            renderDetail(data.agreement);
        } else {
            showToast('Failed to load agreement', true);
        }
    } catch(e) {
        showToast('Error loading agreement', true);
    }
}

/* ── Render detail panel ── */
function renderDetail(ag) {
    const prefs    = parseJSON(ag.preferences, {});
    const sigs     = parseJSON(ag.signatures, {});
    const date     = new Date(ag.created_at).toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric' });
    const client   = ag.user_name || 'Unknown';
    const email    = ag.client_email || ag.user_email || '—';
    const phone    = ag.client_phone || ag.user_phone || '—';
    const status   = ag.status || 'signed';
    const notes    = ag.owner_notes || '';

    // Load or create requirements
    let requirements = parseJSON(ag.requirements, null);
    if (!requirements) {
        const projectKey = Object.values(prefs)[0]?.id || 'default';
        requirements = JSON.parse(JSON.stringify(
            DEFAULT_REQUIREMENTS[projectKey] || DEFAULT_REQUIREMENTS.default
        ));
    }

    const progress = calcProgress(requirements);
    const badgeClass = getStatusBadgeClass(status);
    const statusLabel = status.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

    // Build config rows
    const configRows = Object.entries(prefs).map(([key, p]) => `
        <tr>
            <td>${esc(key.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()))}</td>
            <td>${esc(p.icon || '')} ${esc(p.title || p.id || '—')}</td>
            <td>${esc(p.details || '—')}</td>
            <td class="price-cell">${esc(p.price || '—')}</td>
        </tr>
    `).join('') || '<tr><td colspan="4" style="color:var(--text-dim);text-align:center;">No configuration data</td></tr>';

    const detail = document.getElementById('detail-panel');
    detail.innerHTML = `
        <!-- Header -->
        <div class="detail-header">
            <div class="detail-title-group">
                <div class="detail-id">Request #${ag.id} · ${date}</div>
                <div class="detail-title">${esc(client)}</div>
                <div class="detail-subtitle">${esc(ag.agreement_type || 'Agreement')}</div>
            </div>
            <div class="detail-actions">
                <div class="status-select-wrap">
                    <label>Status</label>
                    <select class="status-select" id="status-select-${ag.id}" onchange="updateStatus(${ag.id})">
                        <option value="signed"      ${status==='signed'?'selected':''}>Signed</option>
                        <option value="in-progress" ${status==='in-progress'?'selected':''}>In Progress</option>
                        <option value="complete"    ${status==='complete'?'selected':''}>Complete</option>
                        <option value="pending"     ${status==='pending'?'selected':''}>Pending</option>
                        <option value="cancelled"   ${status==='cancelled'?'selected':''}>Cancelled</option>
                    </select>
                </div>
                <span class="status-badge ${badgeClass}">${statusLabel}</span>
            </div>
        </div>

        <!-- Info grid -->
        <div class="detail-grid">

            <!-- Client Info -->
            <div class="detail-card">
                <div class="detail-card-title">Client Information</div>
                <div class="info-row">
                    <span class="info-label">Name</span>
                    <span class="info-value">${esc(client)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value">${esc(email)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value">${esc(phone)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Agreement Date</span>
                    <span class="info-value">${date}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Signed At</span>
                    <span class="info-value" style="font-size:0.78rem;">
                        ${sigs.timestamp ? new Date(sigs.timestamp).toLocaleString('en-CA') : '—'}
                    </span>
                </div>
            </div>

            <!-- Wax Seal + Status -->
            <div class="detail-card" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                ${ag.wax_seal_path ? `
                    <div class="client-seal-wrap">
                        <img src="${esc(ag.wax_seal_path)}" alt="Client Seal" class="client-seal-img">
                        <div class="client-seal-label">Client Seal</div>
                    </div>
                ` : '<div style="color:var(--text-dim);font-size:0.8rem;">No seal on file</div>'}
                <div style="flex:1;">
                    <div class="info-row">
                        <span class="info-label">Token</span>
                        <span class="info-value" style="font-size:0.72rem;font-family:monospace;">${esc(ag.unique_token || '—')}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Agreement ID</span>
                        <span class="info-value">#${ag.id}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Completion</span>
                        <span class="info-value" style="color:var(--orange);">${progress}%</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Current Status</span>
                        <span class="status-badge ${badgeClass}">${statusLabel}</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Build Configuration -->
        <div class="detail-card" style="margin-bottom:24px;">
            <div class="detail-card-title">Build Configuration — Schedule A</div>
            <table class="config-table">
                <thead>
                    <tr>
                        <th style="width:18%;">Category</th>
                        <th style="width:22%;">Selection</th>
                        <th style="width:40%;">Details</th>
                        <th style="width:20%;">Pricing (CAD)</th>
                    </tr>
                </thead>
                <tbody>${configRows}</tbody>
            </table>
        </div>

        <!-- Requirements Checklist -->
        <div class="requirements-card">
            <div class="req-header">
                <div class="req-title">📋 Requirements Checklist</div>
                <div class="req-progress-bar-wrap">
                    <div class="req-progress-bar">
                        <div class="req-progress-fill" id="req-fill-${ag.id}" style="width:${progress}%;"></div>
                    </div>
                    <div class="req-progress-text" id="req-pct-${ag.id}">${progress}%</div>
                </div>
            </div>
            <div class="req-list" id="req-list-${ag.id}">
                ${requirements.map(r => buildReqItem(ag.id, r)).join('')}
            </div>
            <div class="req-add-row">
                <input type="text" class="req-add-input" id="req-new-input-${ag.id}"
                    placeholder="Add a custom requirement…"
                    onkeydown="if(event.key==='Enter') addRequirement(${ag.id})">
                <button class="btn-add-req" onclick="addRequirement(${ag.id})">+ Add</button>
            </div>
        </div>

        <!-- Owner Notes -->
        <div class="detail-card">
            <div class="detail-card-title">Owner Notes</div>
            <textarea class="notes-area" id="notes-${ag.id}"
                placeholder="Internal notes, follow-ups, client preferences, next steps…">${esc(notes)}</textarea>
            <div style="display:flex;align-items:center;margin-top:10px;">
                <button class="btn-save-notes" onclick="saveNotes(${ag.id})">💾 Save Notes</button>
                <span class="save-feedback" id="notes-feedback-${ag.id}">✓ Saved</span>
            </div>
        </div>

        <!-- Invoice Section -->
        <div class="detail-card">
            <div class="detail-card-title">📄 Invoice</div>
            <div class="invoice-admin-section" id="invoice-section-${ag.id}">
                ${ag.invoice_number ? `
                    <div class="info-row">
                        <span class="info-label">Invoice #</span>
                        <span class="info-value" style="font-family:monospace;">${esc(ag.invoice_number)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Generated</span>
                        <span class="info-value">${ag.invoice_generated_at ? new Date(ag.invoice_generated_at).toLocaleString('en-CA') : '—'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Total Estimate</span>
                        <span class="info-value" style="color:var(--gold);">${esc(ag.total_label || 'Contact for quote')}</span>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:14px;">
                        <a href="/api/download-invoice/${ag.id}" class="btn-download-invoice" target="_blank">
                            ⬇ Download Invoice
                        </a>
                        <button class="btn-view-invoice" onclick="viewInvoice(${ag.id})">
                            👁 Preview Invoice
                        </button>
                    </div>
                ` : `
                    <div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:12px;">
                        No invoice generated yet for this agreement.
                    </div>
                    <button class="btn-generate-invoice" onclick="generateInvoice(${ag.id})">
                        📄 Generate Invoice Now
                    </button>
                `}
            </div>
        </div>
    `;

    // Store requirements in memory for this agreement
    window._reqs = window._reqs || {};
    window._reqs[ag.id] = requirements;
}

/* ── Build a single requirement item ── */
function buildReqItem(agId, r) {
    return `
        <div class="req-item ${r.done ? 'completed' : ''}" id="req-item-${agId}-${r.id}">
            <div class="req-checkbox" onclick="toggleReq(${agId}, '${r.id}')">
                <span class="req-checkbox-tick">✓</span>
            </div>
            <div class="req-text-wrap">
                <div class="req-label">${esc(r.label)}</div>
                ${r.desc ? `<div class="req-desc">${esc(r.desc)}</div>` : ''}
            </div>
            <div class="req-date">${r.completedAt ? new Date(r.completedAt).toLocaleDateString('en-CA') : ''}</div>
            <div onclick="removeReq(${agId}, '${r.id}')"
                 style="cursor:pointer;color:rgba(255,92,92,0.4);font-size:0.75rem;padding:2px 4px;transition:color 0.2s;"
                 onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='rgba(255,92,92,0.4)'">✕</div>
        </div>
    `;
}

/* ── Toggle requirement completion ── */
function toggleReq(agId, reqId) {
    const reqs = window._reqs[agId];
    if (!reqs) return;
    const r = reqs.find(x => x.id === reqId);
    if (!r) return;
    r.done = !r.done;
    r.completedAt = r.done ? new Date().toISOString() : null;

    const item = document.getElementById(`req-item-${agId}-${reqId}`);
    if (item) {
        item.classList.toggle('completed', r.done);
        const dateEl = item.querySelector('.req-date');
        if (dateEl) dateEl.textContent = r.completedAt ? new Date(r.completedAt).toLocaleDateString('en-CA') : '';
    }

    updateReqProgress(agId);
    saveRequirements(agId);
}

/* ── Add custom requirement ── */
function addRequirement(agId) {
    const input = document.getElementById(`req-new-input-${agId}`);
    const label = input.value.trim();
    if (!label) return;

    const reqs = window._reqs[agId] || [];
    const newReq = {
        id: 'custom-' + Date.now(),
        label,
        desc: '',
        done: false
    };
    reqs.push(newReq);
    window._reqs[agId] = reqs;

    const list = document.getElementById(`req-list-${agId}`);
    if (list) {
        list.insertAdjacentHTML('beforeend', buildReqItem(agId, newReq));
    }

    input.value = '';
    updateReqProgress(agId);
    saveRequirements(agId);
}

/* ── Remove requirement ── */
function removeReq(agId, reqId) {
    const reqs = window._reqs[agId];
    if (!reqs) return;
    const idx = reqs.findIndex(r => r.id === reqId);
    if (idx !== -1) reqs.splice(idx, 1);
    const item = document.getElementById(`req-item-${agId}-${reqId}`);
    if (item) item.remove();
    updateReqProgress(agId);
    saveRequirements(agId);
}

/* ── Update progress bar ── */
function updateReqProgress(agId) {
    const reqs = window._reqs[agId] || [];
    const progress = calcProgress(reqs);

    const fill = document.getElementById(`req-fill-${agId}`);
    const pct  = document.getElementById(`req-pct-${agId}`);
    if (fill) fill.style.width = progress + '%';
    if (pct)  pct.textContent  = progress + '%';

    // Update sidebar card too
    const rc = document.getElementById(`rc-${agId}`);
    if (rc) {
        const progressEl = rc.querySelector('.rc-progress');
        if (progressEl) progressEl.textContent = progress + '% done';
    }
}

/* ── Save requirements to server ── */
async function saveRequirements(agId) {
    const reqs = window._reqs[agId] || [];
    try {
        await fetch(`/api/admin/requirements/${agId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ requirements: reqs })
        });
    } catch(e) { /* silent */ }
}

/* ── Save notes ── */
async function saveNotes(agId) {
    const notes    = document.getElementById(`notes-${agId}`)?.value || '';
    const statusEl = document.getElementById(`status-select-${agId}`);
    const status   = statusEl?.value || 'signed';

    try {
        const res  = await fetch(`/api/admin/status/${agId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, notes })
        });
        const data = await res.json();
        if (data.success) {
            const fb = document.getElementById(`notes-feedback-${agId}`);
            if (fb) { fb.classList.add('show'); setTimeout(() => fb.classList.remove('show'), 2000); }
            // Update local data
            const ag = allAgreements.find(a => a.id === agId);
            if (ag) { ag.owner_notes = notes; ag.status = status; }
            updateStats();
            renderSidebar(allAgreements);
            // Re-mark active
            setTimeout(() => {
                const card = document.getElementById(`rc-${agId}`);
                if (card) card.classList.add('active');
            }, 10);
        }
    } catch(e) {
        showToast('Save failed', true);
    }
}

/* —— Invoice Functions —— */
async function generateInvoice(agId) {
    try {
        const res = await fetch("/api/generate-invoice", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ agreementId: agId })
        });
        const data = await res.json();
        if (data.success) {
            showToast("Invoice generated: " + data.invoiceNumber);
            selectRequest(agId);
        } else {
            showToast("Invoice generation failed: " + (data.error || "Unknown error"), true);
        }
    } catch(e) {
        showToast("Invoice generation error", true);
    }
}

function viewInvoice(agId) {
    window.open("/api/download-invoice/" + agId, "_blank");
}

/* ── Update status (from dropdown) ── */
async function updateStatus(agId) {
    const statusEl = document.getElementById(`status-select-${agId}`);
    const status   = statusEl?.value || 'signed';
    const notes    = document.getElementById(`notes-${agId}`)?.value || '';

    try {
        await fetch(`/api/admin/status/${agId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, notes })
        });
        // Update badge
        const badge = statusEl?.closest('.detail-header')?.querySelector('.status-badge');
        if (badge) {
            badge.className = 'status-badge ' + getStatusBadgeClass(status);
            badge.textContent = status.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        // Update sidebar
        const ag = allAgreements.find(a => a.id === agId);
        if (ag) ag.status = status;
        updateStats();
        renderSidebar(allAgreements);
        setTimeout(() => {
            const card = document.getElementById(`rc-${agId}`);
            if (card) card.classList.add('active');
        }, 10);
        showToast('Status updated');
    } catch(e) {
        showToast('Update failed', true);
    }
}

/* ── Logout ── */
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/api/admin/logout', { method: 'POST' });
        window.location.href = '/';
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = allAgreements.filter(a =>
            (a.user_name || '').toLowerCase().includes(q) ||
            (a.agreement_type || '').toLowerCase().includes(q) ||
            (a.client_email || '').toLowerCase().includes(q)
        );
        renderSidebar(filtered);
    });

    checkAuth();
});

/* ── Utilities ── */
function calcProgress(reqs) {
    if (!reqs || !reqs.length) return 0;
    return Math.round((reqs.filter(r => r.done).length / reqs.length) * 100);
}

function parseJSON(str, fallback) {
    if (!str) return fallback;
    try { return JSON.parse(str); } catch(e) { return fallback; }
}

function getStatusDot(status) {
    return { signed: 'dot-signed', pending: 'dot-pending', complete: 'dot-complete', cancelled: 'dot-cancelled', 'in-progress': 'dot-pending' }[status] || 'dot-signed';
}

function getStatusBadgeClass(status) {
    return { signed: 'badge-signed', pending: 'badge-pending', complete: 'badge-complete', cancelled: 'badge-cancelled', 'in-progress': 'badge-in-progress' }[status] || 'badge-signed';
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
