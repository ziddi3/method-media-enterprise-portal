<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill of Sale - Method Media</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .template-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            background: url('upload://77546b03-cb7f-4d35-8508-89239ff9d337.jpg') no-repeat center center;
            background-size: contain;
            background-position: top center;
            min-height: 1600px;
        }

        /* Signature Overlay Areas - Positioned precisely over template */
        .signature-overlay {
            position: absolute;
            top: 1280px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 200px;
            display: flex;
            gap: 50px;
            justify-content: center;
        }

        .signature-group {
            position: relative;
            width: 250px;
            height: 180px;
        }

        .signature-title {
            position: absolute;
            top: -30px;
            left: 0;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #00ffcc;
            font-weight: 600;
            text-transform: uppercase;
        }

        .signature-pad {
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: 150px;
            background: #000000;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            overflow: hidden;
        }

        .signature-pad canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .signature-controls {
            position: absolute;
            bottom: -35px;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .sig-btn {
            padding: 6px 16px;
            background: linear-gradient(135deg, #00ffcc, #0099cc);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 12px;
        }

        .sig-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }

        .sig-btn.clear {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        }

        /* Action Buttons - Positioned precisely over template */
        .action-overlay {
            position: absolute;
            top: 1480px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 60px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn.download {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
        }

        .action-btn.download.glowing {
            animation: glowing 2s infinite;
        }

        @keyframes glowing {
            0%, 100% { box-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff; }
            50% { box-shadow: 0 0 30px #00d4ff, 0 0 60px #00d4ff; }
        }

        .action-btn.print {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: white;
        }

        .action-btn.email {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .action-btn:active {
            transform: translateY(-1px);
        }

        /* Floating Badge */
        .floating-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border-radius: 25px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 12px;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Loading Animation */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 300px;
        }

        .notification.success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: white;
        }

        .notification.warning {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            color: white;
        }

        .notification.error {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .template-container {
                min-height: 1200px;
            }
            
            .signature-overlay {
                width: 90%;
                max-width: 400px;
                top: 960px;
                flex-direction: column;
                gap: 30px;
                height: auto;
            }
            
            .signature-group {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
            
            .action-overlay {
                width: 90%;
                max-width: 400px;
                top: 1100px;
                flex-direction: column;
                gap: 10px;
                height: auto;
            }
            
            .action-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }
            
            .signature-controls,
            .action-overlay,
            .floating-badge {
                display: none !important;
            }
            
            .template-container {
                background: white;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="template-container">
        <!-- Signature Overlays - Positioned precisely over template signature areas -->
        <div class="signature-overlay">
            <!-- Seller Signature -->
            <div class="signature-group">
                <div class="signature-title">Seller Signature</div>
                <div class="signature-pad">
                    <canvas id="sellerSignature"></canvas>
                </div>
                <div class="signature-controls">
                    <button class="sig-btn clear" onclick="clearSignature('seller')">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                    <button class="sig-btn" onclick="saveSignature('seller')">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </div>

            <!-- Buyer Signature -->
            <div class="signature-group">
                <div class="signature-title">Buyer Signature</div>
                <div class="signature-pad">
                    <canvas id="buyerSignature"></canvas>
                </div>
                <div class="signature-controls">
                    <button class="sig-btn clear" onclick="clearSignature('buyer')">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                    <button class="sig-btn" onclick="saveSignature('buyer')">
                        <i class="fas fa-save"></i> Save
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Buttons - Positioned precisely over template button area -->
        <div class="action-overlay">
            <button class="action-btn download" id="downloadBtn" onclick="downloadPDF()">
                <i class="fas fa-download"></i>
                DOWNLOAD / SHARE
            </button>
            <button class="action-btn print" onclick="window.print()">
                <i class="fas fa-print"></i>
                Print
            </button>
            <button class="action-btn email" onclick="emailDocument()">
                <i class="fas fa-envelope"></i>
                Email
            </button>
        </div>
    </div>

    <!-- Floating Badge -->
    <div class="floating-badge">
        Created by Method Media - Heavy Hitters
    </div>

    <!-- Loading Indicator -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        // Initialize signature pads
        let sellerPad, buyerPad;
        let sellerSignatureData = null;
        let buyerSignatureData = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize signature pads
            initializeSignaturePads();

            // Load saved data
            loadSavedData();

            // Auto-save every 30 seconds
            setInterval(autoSave, 30000);
        });

        function initializeSignaturePads() {
            // Seller signature pad
            const sellerCanvas = document.getElementById('sellerSignature');
            sellerPad = new SignaturePad(sellerCanvas, {
                backgroundColor: 'rgba(0, 0, 0, 0)',
                penColor: '#00ffcc'
            });

            // Buyer signature pad
            const buyerCanvas = document.getElementById('buyerSignature');
            buyerPad = new SignaturePad(buyerCanvas, {
                backgroundColor: 'rgba(0, 0, 0, 0)',
                penColor: '#00ffcc'
            });

            // Resize canvases
            resizeCanvas(sellerCanvas, sellerPad);
            resizeCanvas(buyerCanvas, buyerPad);

            // Handle window resize
            window.addEventListener('resize', () => {
                resizeCanvas(sellerCanvas, sellerPad);
                resizeCanvas(buyerCanvas, buyerPad);
            });
        }

        function resizeCanvas(canvas, pad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext('2d').scale(ratio, ratio);
            pad.clear();
        }

        function clearSignature(type) {
            if (type === 'seller') {
                sellerPad.clear();
                sellerSignatureData = null;
            } else {
                buyerPad.clear();
                buyerSignatureData = null;
            }
            updateDownloadButton();
            saveData();
        }

        function saveSignature(type) {
            if (type === 'seller') {
                sellerSignatureData = sellerPad.toDataURL();
                showNotification('Seller signature saved!', 'success');
            } else {
                buyerSignatureData = buyerPad.toDataURL();
                showNotification('Buyer signature saved!', 'success');
            }
            updateDownloadButton();
            saveData();
        }

        function updateDownloadButton() {
            const downloadBtn = document.getElementById('downloadBtn');
            if (sellerSignatureData && buyerSignatureData) {
                downloadBtn.classList.add('glowing');
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> DOWNLOAD & READY';
            } else {
                downloadBtn.classList.remove('glowing');
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> DOWNLOAD / SHARE';
            }
        }

        function downloadPDF() {
            if (!sellerSignatureData || !buyerSignatureData) {
                showNotification('Both signatures are required before downloading!', 'warning');
                return;
            }

            showLoading();
            
            // Temporarily hide signature controls for clean PDF
            document.querySelectorAll('.signature-controls').forEach(el => {
                el.style.display = 'none';
            });
            document.querySelector('.action-overlay').style.display = 'none';
            document.querySelector('.floating-badge').style.display = 'none';

            html2canvas(document.querySelector('.template-container'), {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#000000'
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                
                const imgWidth = 210;
                const pageHeight = 295;
                const imgHeight = canvas.height * imgWidth / canvas.width;
                let heightLeft = imgHeight;
                let position = 0;

                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;

                while (heightLeft >= 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }

                pdf.save('Bill_of_Sale_Signed.pdf');

                // Restore UI elements
                document.querySelectorAll('.signature-controls').forEach(el => {
                    el.style.display = 'flex';
                });
                document.querySelector('.action-overlay').style.display = 'flex';
                document.querySelector('.floating-badge').style.display = 'block';

                hideLoading();
                showNotification('PDF downloaded successfully!', 'success');
            }).catch(error => {
                console.error('PDF generation error:', error);
                hideLoading();
                showNotification('Error generating PDF. Please try again.', 'error');
                
                // Restore UI elements
                document.querySelectorAll('.signature-controls').forEach(el => {
                    el.style.display = 'flex';
                });
                document.querySelector('.action-overlay').style.display = 'flex';
                document.querySelector('.floating-badge').style.display = 'block';
            });
        }

        function emailDocument() {
            if (!sellerSignatureData || !buyerSignatureData) {
                showNotification('Both signatures are required before emailing!', 'warning');
                return;
            }
            
            const subject = encodeURIComponent('Signed Bill of Sale - Method Media');
            const body = encodeURIComponent(`Please find the signed Bill of Sale attached.\n\nDocument ID: MM-VLNK\nDate: ${new Date().toLocaleDateString()}\nSeller: Charles Stenerson\nBuyer: Franco Milucci\nVehicle: 2018 Nissan Murano\nPrice: $2,000 CAD\n\nBest regards,\nMethod Media - Heavy Hitters`);
            window.location.href = `mailto:?subject=${subject}&body=${body}`;
            showNotification('Email client opened with document details!', 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function saveData() {
            const data = {
                sellerSignature: sellerSignatureData,
                buyerSignature: buyerSignatureData,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('billOfSaleData', JSON.stringify(data));
        }

        function loadSavedData() {
            const savedData = localStorage.getItem('billOfSaleData');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    
                    // Restore signatures
                    if (data.sellerSignature) {
                        sellerSignatureData = data.sellerSignature;
                        const img = new Image();
                        img.onload = function() {
                            sellerPad.clear();
                            sellerPad.ctx.drawImage(img, 0, 0);
                        };
                        img.src = data.sellerSignature;
                    }
                    
                    if (data.buyerSignature) {
                        buyerSignatureData = data.buyerSignature;
                        const img = new Image();
                        img.onload = function() {
                            buyerPad.clear();
                            buyerPad.ctx.drawImage(img, 0, 0);
                        };
                        img.src = data.buyerSignature;
                    }
                    
                    updateDownloadButton();
                } catch (error) {
                    console.error('Error loading saved data:', error);
                }
            }
        }

        function autoSave() {
            saveData();
            console.log('Auto-saved at', new Date().toLocaleTimeString());
        }
    </script>
</body>
</html>
