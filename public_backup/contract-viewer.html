<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Media - Contract Viewer</title>
    <link rel="stylesheet" href="page-flip.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .contract-header {
            text-align: center;
            padding: 40px 20px;
        }
        
        .contract-header h1 {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .contract-header p {
            color: #aaa;
            font-size: 16px;
        }
        
        .contract-container {
            padding: 0 20px 40px;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="contract-header">
        <h1>Your Agreement</h1>
        <p>Generated by Method Media - Heavy Hitters</p>
    </div>
    
    <div class="contract-container">
        <div class="contract-book-container" id="contractBook">
            <div class="contract-loading" id="contractLoading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Generating your contract...</div>
            </div>
            
            <div id="contractPages"></div>
        </div>
        
        <div class="page-navigation" id="pageNavigation" style="display: none;">
            <button class="page-nav-btn" id="prevPageBtn" disabled>← Previous</button>
            <span class="page-indicator">Page <span id="currentPage">1</span> of <span id="totalPages">1</span></span>
            <button class="page-nav-btn" id="nextPageBtn">Next →</button>
        </div>
    </div>

    <script src="contract-generator.js"></script>
    <script>
        // Contract Viewer
        class ContractViewer {
            constructor() {
                this.currentPage = 1;
                this.totalPages = 0;
                this.pages = [];
                this.contractData = null;
                
                this.init();
            }
            
            init() {
                // Load contract data from localStorage
                this.contractData = JSON.parse(localStorage.getItem('contractData') || '{}');
                
                if (!this.contractData.preferences) {
                    this.showError('No contract data found');
                    return;
                }
                
                this.generateContract();
                this.setupEventListeners();
            }
            
            generateContract() {
                const contractText = ContractGenerator.generateContractText(this.contractData.preferences);
                const pages = ContractGenerator.splitContentIntoPages(contractText.sections);
                
                this.totalPages = pages.length;
                this.pages = pages;
                
                // Render pages
                this.renderPages(pages, contractText);
                
                // Show navigation
                document.getElementById('pageNavigation').style.display = 'flex';
                document.getElementById('contractLoading').style.display = 'none';
                
                // Update page indicators
                document.getElementById('totalPages').textContent = this.totalPages;
                document.getElementById('currentPage').textContent = this.currentPage;
                
                // Update navigation buttons
                this.updateNavigationButtons();
            }
            
            renderPages(pages, contractText) {
                const container = document.getElementById('contractPages');
                container.innerHTML = '';
                
                pages.forEach((pageData, index) => {
                    const pageNum = index + 1;
                    const pageElement = document.createElement('div');
                    pageElement.className = 'contract-page';
                    pageElement.dataset.page = pageNum;
                    pageElement.style.display = pageNum === 1 ? 'block' : 'none';
                    
                    // Create page content
                    const templateImg = document.createElement('img');
                    templateImg.className = 'contract-template';
                    templateImg.src = this.getTemplateImage(pageNum);
                    templateImg.alt = `Contract Page ${pageNum}`;
                    
                    const contentOverlay = document.createElement('div');
                    contentOverlay.className = 'contract-content-overlay';
                    
                    // Add title on first page
                    if (pageNum === 1) {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'contract-title';
                        titleDiv.innerHTML = `
                            <h2 style="font-family: 'Great Vibes', cursive; font-size: 42px; color: #1a1a2e; text-align: center; margin-bottom: 40px;">${contractText.title}</h2>
                            <p style="font-family: 'Great Vibes', cursive; font-size: 20px; color: #2c1810; text-align: center; margin-bottom: 60px;">${contractText.type}</p>
                            <p style="font-family: 'Great Vibes', cursive; font-size: 18px; color: #2c1810; text-align: center;">Date: ${contractText.date}</p>
                        `;
                        contentOverlay.appendChild(titleDiv);
                    }
                    
                    // Render sections
                    pageData.sections.forEach(section => {
                        const sectionDiv = document.createElement('div');
                        sectionDiv.className = 'contract-section';
                        
                        const title = document.createElement('h3');
                        title.className = 'contract-section-title';
                        title.textContent = section.title;
                        
                        const content = document.createElement('div');
                        content.className = 'contract-section-content';
                        content.innerHTML = section.content.replace(/\n/g, '<br>');
                        
                        sectionDiv.appendChild(title);
                        sectionDiv.appendChild(content);
                        contentOverlay.appendChild(sectionDiv);
                    });
                    
                    // Add page number
                    const pageNumber = document.createElement('div');
                    pageNumber.className = 'page-number';
                    pageNumber.textContent = `Page ${pageNum} of ${this.totalPages}`;
                    
                    // Add post stamp
                    const postStamp = document.createElement('div');
                    postStamp.className = 'post-stamp';
                    postStamp.innerHTML = `<img src="data:image/png;base64,POST_STAMP_BASE64_HERE" alt="Post Stamp">`;
                    
                    // Add signatures on last page
                    if (pageNum === this.totalPages) {
                        const signaturesDiv = document.createElement('div');
                        signaturesDiv.className = 'contract-signatures';
                        signaturesDiv.innerHTML = `
                            <div class="signature-line">
                                <span class="signature-label">Service Provider:</span>
                                ${this.contractData.signatureImage ? `<img src="${this.contractData.signatureImage}" class="signature-image" alt="Provider Signature">` : '<span style="font-family: Great Vibes; font-size: 20px; color: #2c1810; margin-left: 20px;">_____________________</span>'}
                            </div>
                            <div class="signature-line">
                                <span class="signature-label">Client (${this.contractData.userName}):</span>
                                ${this.contractData.clientSignature ? `<img src="${this.contractData.clientSignature}" class="signature-image-client" alt="Client Signature">` : '<span style="font-family: Great Vibes; font-size: 20px; color: #2c1810; margin-left: 20px;">_____________________</span>'}
                            </div>
                            <div class="wax-seal-final">
                                <img src="${this.contractData.waxSealImage}" class="wax-seal-image" alt="Wax Seal">
                            </div>
                        `;
                        contentOverlay.appendChild(signaturesDiv);
                    }
                    
                    pageElement.appendChild(templateImg);
                    pageElement.appendChild(contentOverlay);
                    pageElement.appendChild(pageNumber);
                    pageElement.appendChild(postStamp);
                    
                    container.appendChild(pageElement);
                });
            }
            
            getTemplateImage(pageNum) {
                const templates = {
                    1: 'template_page1-1.png',
                    2: 'template_page2-1.png',
                    3: 'template_page3-1.png'
                };
                return templates[pageNum] || templates[1];
            }
            
            setupEventListeners() {
                document.getElementById('prevPageBtn').addEventListener('click', () => this.previousPage());
                document.getElementById('nextPageBtn').addEventListener('click', () => this.nextPage());
                
                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.previousPage();
                    if (e.key === 'ArrowRight') this.nextPage();
                });
            }
            
            previousPage() {
                if (this.currentPage > 1) {
                    this.flipPage(this.currentPage, this.currentPage - 1);
                }
            }
            
            nextPage() {
                if (this.currentPage < this.totalPages) {
                    this.flipPage(this.currentPage, this.currentPage + 1);
                }
            }
            
            flipPage(fromPage, toPage) {
                const fromPageElement = document.querySelector(`.contract-page[data-page="${fromPage}"]`);
                const toPageElement = document.querySelector(`.contract-page[data-page="${toPage}"]`);
                
                if (!fromPageElement || !toPageElement) return;
                
                // Add flip animation
                fromPageElement.classList.add('flipping');
                
                setTimeout(() => {
                    fromPageElement.style.display = 'none';
                    fromPageElement.classList.remove('flipping');
                    fromPageElement.classList.add('flipped');
                    
                    toPageElement.style.display = 'block';
                    toPageElement.classList.add('flipping');
                    
                    setTimeout(() => {
                        toPageElement.classList.remove('flipping');
                    }, 100);
                    
                    this.currentPage = toPage;
                    document.getElementById('currentPage').textContent = this.currentPage;
                    this.updateNavigationButtons();
                }, 400);
            }
            
            updateNavigationButtons() {
                document.getElementById('prevPageBtn').disabled = this.currentPage <= 1;
                document.getElementById('nextPageBtn').disabled = this.currentPage >= this.totalPages;
            }
            
            showError(message) {
                document.getElementById('contractLoading').innerHTML = `
                    <div style="color: #ff4444; font-size: 18px;">${message}</div>
                `;
            }
        }
        
        // Initialize viewer
        document.addEventListener('DOMContentLoaded', () => {
            new ContractViewer();
        });
    </script>
</body>
</html>
